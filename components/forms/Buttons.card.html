<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-background-canvas); font-family: var(--font-sans); color: var(--color-text-primary); }
  .wrap { padding: 28px; display: flex; flex-direction: column; gap: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 10px; }
  .group { border-top: 1px solid var(--color-border-subtle); padding-top: 16px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton } = window.AtlasDesignSystem_221c8f;
const Plus = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>);
const Arrow = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>);
const Dots = () => (<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>);
const Heart = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>);

function Demo() {
  return (
    <React.Fragment>
      <div>
        <div className="lbl">Variants</div>
        <div className="row">
          <Button variant="primary">Primary</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="destructive">Delete</Button>
          <Button variant="link">Link action</Button>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Sizes &amp; icons</div>
        <div className="row">
          <Button size="sm">Small</Button>
          <Button size="md" iconLeading={<Plus />}>Create</Button>
          <Button size="lg" iconTrailing={<Arrow />}>Continue</Button>
          <Button loading>Saving</Button>
          <Button disabled>Disabled</Button>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Icon buttons</div>
        <div className="row">
          <IconButton variant="solid" label="Add"><Plus /></IconButton>
          <IconButton variant="outline" label="Favorite"><Heart /></IconButton>
          <IconButton variant="ghost" label="More"><Dots /></IconButton>
          <IconButton variant="ghost" size="sm" label="More small"><Dots /></IconButton>
          <IconButton variant="ghost" disabled label="Disabled"><Dots /></IconButton>
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
