<!-- @dsCard group="Colors" viewport="700x210" name="Semantic / Status" subtitle="Success, warning, danger, info & AI accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface-default); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { height: 56px; border-radius: var(--radius-md); }
  .chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; border: 1px solid; }
  .name { font-size: 12px; font-weight: 600; color: var(--color-text-primary); }
  .tok { font-size: 11px; color: var(--color-text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <div class="swatch" style="background:var(--color-success-bg)"></div>
    <div class="name">Success</div>
    <div class="chip" style="background:var(--color-status-success-bg);color:var(--color-status-success-text);border-color:var(--color-status-success-border)">Completed</div>
    <div class="tok">--color-success-*</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:var(--color-warning-500)"></div>
    <div class="name">Warning</div>
    <div class="chip" style="background:var(--color-status-warning-bg);color:var(--color-status-warning-text);border-color:var(--color-status-warning-border)">Pending</div>
    <div class="tok">--color-warning-*</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:var(--color-danger-500)"></div>
    <div class="name">Danger</div>
    <div class="chip" style="background:var(--color-status-error-bg);color:var(--color-status-error-text);border-color:var(--color-status-error-border)">Failed</div>
    <div class="tok">--color-danger-*</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:var(--color-blue-500)"></div>
    <div class="name">Info</div>
    <div class="chip" style="background:var(--color-status-info-bg);color:var(--color-status-info-text);border-color:var(--color-status-info-border)">In review</div>
    <div class="tok">--color-info-*</div>
  </div>
  <div class="col">
    <div class="swatch" style="background:var(--color-ai-500)"></div>
    <div class="name">AI accent</div>
    <div class="chip" style="background:var(--color-ai-generated-bg);color:var(--color-ai-generated-text);border-color:transparent">Generated</div>
    <div class="tok">--color-ai-*</div>
  </div>
</div>
</body>
</html>
