<!-- @dsCard group="Components" viewport="700x360" name="Cards & Table" subtitle="Surface containers and the sortable data table" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-background-canvas); font-family: var(--font-sans); }
  .wrap { padding: 28px; display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Card, Badge, Button, Table, Avatar } = window.AtlasDesignSystem_221c8f;
const rows = [
  { id: 1, name: "Ada Lovelace", role: "Owner", mrr: 4200, status: "Active" },
  { id: 2, name: "Grace Hopper", role: "Admin", mrr: 2800, status: "Active" },
  { id: 3, name: "Alan Turing", role: "Member", mrr: 1200, status: "Trial" },
];
const cols = [
  { key: "name", header: "Customer", sortable: true, render: (v) => <span style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={v} size="xs" />{v}</span> },
  { key: "role", header: "Role" },
  { key: "status", header: "Status", render: (v) => <Badge tone={v==="Active"?"success":"warning"} dot>{v}</Badge> },
  { key: "mrr", header: "MRR", align: "right", sortable: true, render: (v) => "$"+v.toLocaleString() },
];
function Demo() {
  return (
    <React.Fragment>
      <Card interactive>
        <Card.Header title="Pro plan" subtitle="Billed monthly" action={<Badge tone="brand">Popular</Badge>} />
        <Card.Body>Everything in Starter plus advanced analytics, unlimited seats and priority support.</Card.Body>
        <Card.Footer><Button size="sm" fullWidth>Upgrade</Button></Card.Footer>
      </Card>
      <Table columns={cols} data={rows} striped />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
