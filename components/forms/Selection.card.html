<!-- @dsCard group="Components" viewport="700x320" name="Selection Controls" subtitle="Checkbox, Radio, Switch — states & descriptions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-background-canvas); font-family: var(--font-sans); }
  .wrap { padding: 28px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 16px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Checkbox, Radio, Switch } = window.AtlasDesignSystem_221c8f;
function Demo() {
  const [plan, setPlan] = React.useState("pro");
  return (
    <React.Fragment>
      <div className="col">
        <div className="lbl">Checkbox</div>
        <Checkbox defaultChecked label="Email notifications" description="Product updates and digests" />
        <Checkbox indeterminate label="Select all" />
        <Checkbox label="SMS alerts" />
        <Checkbox disabled label="Disabled option" />
      </div>
      <div className="col">
        <div className="lbl">Radio</div>
        <Radio name="plan" checked={plan==="starter"} onChange={()=>setPlan("starter")} label="Starter" description="For individuals" />
        <Radio name="plan" checked={plan==="pro"} onChange={()=>setPlan("pro")} label="Pro" description="For small teams" />
        <Radio name="plan" checked={plan==="ent"} onChange={()=>setPlan("ent")} label="Enterprise" />
      </div>
      <div className="col">
        <div className="lbl">Switch</div>
        <Switch defaultChecked label="Two-factor auth" description="Require a code at sign-in" />
        <Switch label="Public profile" />
        <Switch size="sm" defaultChecked label="Compact density" />
        <Switch disabled label="Locked setting" />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
