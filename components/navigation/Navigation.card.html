<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-background-canvas); font-family: var(--font-sans); }
  .wrap { padding: 28px; display: flex; flex-direction: column; gap: 24px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 12px; }
  .group { border-top: 1px solid var(--color-border-subtle); padding-top: 18px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Tabs, Breadcrumb } = window.AtlasDesignSystem_221c8f;
const Home = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
function Demo() {
  return (
    <React.Fragment>
      <div>
        <div className="lbl">Breadcrumb</div>
        <Breadcrumb items={[
          { label: "Home", href: "#", icon: <Home /> },
          { label: "Projects", href: "#" },
          { label: "Atlas Mobile", href: "#" },
          { label: "Settings" },
        ]} />
      </div>
      <div className="group">
        <div className="lbl">Tabs — line</div>
        <Tabs variant="line" items={[
          { value: "overview", label: "Overview" },
          { value: "activity", label: "Activity", badge: 12 },
          { value: "members", label: "Members" },
          { value: "settings", label: "Settings", disabled: true },
        ]} />
      </div>
      <div className="group">
        <div className="lbl">Tabs — pill</div>
        <Tabs variant="pill" items={[
          { value: "day", label: "Day" },
          { value: "week", label: "Week" },
          { value: "month", label: "Month" },
        ]} defaultValue="week" />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
