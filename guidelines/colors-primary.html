<!-- @dsCard group="Colors" viewport="700x180" name="Brand / Primary" subtitle="Blue 50–900 — the Atlas action colour" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface-default); font-family: var(--font-sans); }
  .wrap { padding: 24px; }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw { height: 84px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-size: 10.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .meta { display: flex; justify-content: space-between; margin-top: 12px; font-size: 12px; color: var(--color-text-muted); }
  .meta b { color: var(--color-text-primary); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="ramp" id="ramp"></div>
  <div class="meta"><span><b>--color-brand-*</b> · primary action, links, focus</span><span>600 = base · #2563EB</span></div>
</div>
<script>
  const steps = [50,100,200,300,400,500,600,700,800,900];
  const ramp = document.getElementById('ramp');
  steps.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sw';
    el.style.background = `var(--color-brand-${s})`;
    el.style.color = s >= 400 ? '#fff' : '#1E3A8A';
    el.innerHTML = `<span>${s}</span>`;
    ramp.appendChild(el);
  });
</script>
</body>
</html>
