<!-- @dsCard group="Colors" viewport="700x180" name="Neutral / Slate" subtitle="Neutral 0–1000 — surfaces, text & borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface-default); font-family: var(--font-sans); }
  .wrap { padding: 24px; }
  .ramp { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw { height: 84px; display: flex; align-items: flex-end; padding: 7px; }
  .sw span { font-size: 10px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .meta { display: flex; justify-content: space-between; margin-top: 12px; font-size: 12px; color: var(--color-text-muted); }
  .meta b { color: var(--color-text-primary); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="ramp" id="ramp"></div>
  <div class="meta"><span><b>--color-neutral-*</b> · the backbone of every surface</span><span>Slate-tuned, cool gray</span></div>
</div>
<script>
  const steps = [0,50,100,200,300,400,500,600,700,800,900,1000];
  const ramp = document.getElementById('ramp');
  steps.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sw';
    el.style.background = `var(--color-neutral-${s})`;
    el.style.color = s >= 500 ? '#fff' : '#0F172A';
    if (s === 0) el.style.boxShadow = 'inset 0 0 0 1px var(--color-border-subtle)';
    el.innerHTML = `<span>${s}</span>`;
    ramp.appendChild(el);
  });
</script>
</body>
</html>
